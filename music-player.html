<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neumusic · 新拟态音乐</title>
<style>
/* ========================== Reset & Vars ========================== */
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --card: #242438;
  --card2: #2a2a40;
  --text: #d0d0e0;
  --text2: #8888a0;
  --accent: #8b5cf6;
  --accent2: #a78bfa;
  --neumorph-light: rgba(255,255,255,0.04);
  --neumorph-dark: rgba(0,0,0,0.35);
  --radius: 18px;
  --radius-sm: 10px;
  --gap: 16px;
  --sidebar-w: 260px;
  --playlist-w: 300px;
}

body {
  background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f1729 100%);
  color: var(--text);
  font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
  height: 100vh; overflow: hidden;
  user-select: none; -webkit-user-select: none;
}

/* ========================== Layout ========================== */
#app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr var(--playlist-w);
  grid-template-rows: 1fr;
  height: 100vh;
  padding: 12px;
  gap: var(--gap);
}

/* ========================== Neumorphic Mixins ========================== */
.nm-raised {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: 6px 6px 14px var(--neumorph-dark), -3px -3px 8px var(--neumorph-light);
}
.nm-pressed {
  background: var(--card);
  box-shadow: inset 4px 4px 10px var(--neumorph-dark), inset -2px -2px 6px var(--neumorph-light);
}
.nm-btn {
  background: var(--card);
  border: none; border-radius: 50%;
  box-shadow: 4px 4px 10px var(--neumorph-dark), -2px -2px 6px var(--neumorph-light);
  cursor: pointer; color: var(--text);
  display:flex; align-items:center; justify-content:center;
  transition: all 0.15s ease;
}
.nm-btn:hover { box-shadow: 6px 6px 14px var(--neumorph-dark), -3px -3px 8px var(--neumorph-light); }
.nm-btn:active {
  box-shadow: inset 3px 3px 8px var(--neumorph-dark), inset -1px -1px 4px var(--neumorph-light);
  transform: scale(0.94);
}
.nm-input {
  background: var(--card2);
  border: none; border-radius: var(--radius-sm);
  box-shadow: inset 3px 3px 8px var(--neumorph-dark), inset -1px -1px 4px var(--neumorph-light);
  color: var(--text); padding: 10px 16px; font-size: 13px;
  outline: none; width: 100%;
  transition: all 0.2s;
}
.nm-input:focus {
  box-shadow: inset 3px 3px 8px var(--neumorph-dark), inset -1px -1px 4px var(--neumorph-light), 0 0 0 2px var(--accent);
}
.nm-slider {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 6px;
  border-radius: 3px;
  background: var(--card2);
  box-shadow: inset 2px 2px 5px var(--neumorph-dark), inset -1px -1px 3px var(--neumorph-light);
  outline: none;
}
.nm-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 3px 3px 8px var(--neumorph-dark), -2px -2px 5px var(--neumorph-light);
  cursor: pointer; transition: all 0.15s;
}
.nm-slider::-webkit-slider-thumb:active { transform: scale(1.15); }

/* ========================== Sidebar ========================== */
#sidebar {
  display: flex; flex-direction: column; gap: var(--gap);
  overflow: hidden;
}
#logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 20px; font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  padding: 8px 4px;
}
#logo .icon { font-size:28px; -webkit-text-fill-color: initial; }
#sidebar-top {
  padding: 20px; display: flex; flex-direction: column; gap: 14px;
  flex-shrink: 0;
}
#sidebar-stats {
  display: flex; gap: 10px; font-size: 11px; color: var(--text2);
  padding: 0 4px;
}
#sidebar-stats span {
  background: var(--card2); padding: 4px 10px; border-radius: 20px;
  box-shadow: inset 2px 2px 4px var(--neumorph-dark), inset -1px -1px 2px var(--neumorph-light);
}
#lib-actions { display: flex; flex-direction: column; gap: 8px; }
.accent-btn {
  background: linear-gradient(135deg, var(--accent), #ec4899);
  border: none; border-radius: var(--radius-sm);
  color: #fff; padding: 11px 16px; font-size: 13px; font-weight: 600;
  cursor: pointer;
  box-shadow: 4px 4px 12px rgba(139,92,246,0.3);
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.accent-btn:active { transform: scale(0.95); opacity: 0.9; }

#folder-tree {
  flex: 1; overflow-y: auto; padding: 0 16px 16px;
  scrollbar-width: thin; scrollbar-color: var(--card2) transparent;
}
#folder-tree::-webkit-scrollbar { width: 4px; }
#folder-tree::-webkit-scrollbar-thumb { background: var(--card2); border-radius: 2px; }
.folder-item {
  padding: 8px 12px; border-radius: 8px; cursor: pointer;
  font-size: 12px; color: var(--text2);
  display: flex; align-items: center; gap: 8px;
  transition: all 0.15s;
}
.folder-item:hover { background: var(--card2); color: var(--text); }
.folder-item.active { color: var(--accent2); }
.folder-count { margin-left: auto; font-size: 10px; opacity: 0.6; }

/* ========================== Main Player ========================== */
#main {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 24px; padding: 20px;
}
#album-art-wrap {
  position: relative;
  width: min(340px, 40vw); height: min(340px, 40vw);
}
#album-art {
  width: 100%; height: 100%; border-radius: 50%;
  object-fit: cover;
  box-shadow: 12px 12px 30px var(--neumorph-dark), -6px -6px 15px var(--neumorph-light);
  transition: transform 0.5s;
}
#album-art.playing { animation: spin 20s linear infinite; }
#album-art.paused { animation-play-state: paused; }
@keyframes spin { to { transform: rotate(360deg); } }
#album-art-placeholder {
  width: 100%; height: 100%; border-radius: 50%;
  background: var(--card2);
  box-shadow: inset 8px 8px 20px var(--neumorph-dark), inset -4px -4px 10px var(--neumorph-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 80px; opacity: 0.4;
}

#album-art-ring {
  position: absolute; top: -10px; left: -10px;
  width: calc(100% + 20px); height: calc(100% + 20px);
  border-radius: 50%; pointer-events: none;
  border: 3px solid transparent;
  border-top-color: var(--accent);
  animation: ringSpin 3s linear infinite;
  opacity: 0;
}
#album-art-ring.active { opacity: 1; }
@keyframes ringSpin { to { transform: rotate(360deg); } }

#track-info { text-align: center; }
#track-title {
  font-size: 20px; font-weight: 700; letter-spacing: -0.3px;
  max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#track-artist {
  font-size: 14px; color: var(--accent2); margin-top: 4px;
  max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Progress */
#progress-wrap {
  width: 100%; max-width: 500px;
  display: flex; align-items: center; gap: 12px;
}
#progress-bar-wrap {
  flex: 1; position: relative; height: 28px;
  display: flex; align-items: center; cursor: pointer;
}
#progress-bar-wrap input[type=range] {
  position: absolute; width: 100%; top: 50%; transform: translateY(-50%);
}
.progress-time { font-size: 11px; color: var(--text2); min-width: 42px; }

/* Controls */
#controls {
  display: flex; align-items: center; gap: 16px;
}
.ctrl-btn {
  width: 48px; height: 48px; font-size: 20px;
}
#btn-play {
  width: 64px; height: 64px; font-size: 28px;
  background: linear-gradient(135deg, var(--accent), #ec4899);
  color: #fff;
  box-shadow: 6px 6px 18px rgba(139,92,246,0.35), -3px -3px 10px rgba(236,72,153,0.2);
}
#btn-play:active { transform: scale(0.9); }
.ctrl-btn-sm { width: 36px; height: 36px; font-size: 14px; }

#vol-wrap {
  display: flex; align-items: center; gap: 8px; max-width: 160px;
}
#vol-wrap .nm-slider { flex: 1; }

#viz-canvas {
  width: 100%; max-width: 500px; height: 80px;
  border-radius: var(--radius-sm);
  background: var(--card2);
  box-shadow: inset 4px 4px 12px var(--neumorph-dark), inset -2px -2px 6px var(--neumorph-light);
}

/* ========================== Playlist ========================== */
#playlist-panel {
  display: flex; flex-direction: column;
  gap: 10px; overflow: hidden;
}
#playlist-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 16px 0;
  font-size: 14px; font-weight: 700;
  flex-shrink: 0;
}
#search-wrap { padding: 0 12px; flex-shrink: 0; }
#playlist-scroll {
  flex: 1; overflow-y: auto; padding: 0 8px 8px;
  scrollbar-width: thin; scrollbar-color: var(--card2) transparent;
}
#playlist-scroll::-webkit-scrollbar { width: 4px; }
#playlist-scroll::-webkit-scrollbar-thumb { background: var(--card2); border-radius: 2px; }

.track-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius-sm);
  cursor: pointer; transition: all 0.12s;
  margin-bottom: 4px;
}
.track-item:hover { background: var(--card2); }
.track-item.active {
  background: var(--card2);
  box-shadow: inset 3px 3px 8px var(--neumorph-dark), inset -1px -1px 4px var(--neumorph-light);
}
.track-item .t-idx { font-size: 11px; color: var(--text2); width: 20px; text-align: center; }
.track-item .t-cover {
  width: 38px; height: 38px; border-radius: 8px; object-fit: cover;
  box-shadow: 3px 3px 7px var(--neumorph-dark), -1px -1px 3px var(--neumorph-light);
  background: var(--card2); flex-shrink: 0;
}
.track-item .t-meta { flex: 1; min-width: 0; }
.track-item .t-name {
  font-size: 13px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.track-item .t-art {
  font-size: 11px; color: var(--text2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.track-item .t-dur { font-size: 11px; color: var(--text2); flex-shrink: 0; }
.track-item .t-fav {
  font-size: 13px; cursor: pointer; flex-shrink: 0; opacity: 0.4;
  transition: opacity 0.15s;
}
.track-item .t-fav:hover, .track-item .t-fav.liked { opacity: 1; color: #ec4899; }

#empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 12px; color: var(--text2); font-size: 13px; text-align: center;
  padding: 40px;
}
#empty-state .icon { font-size: 48px; opacity: 0.3; }

/* ========================== Responsive ========================== */
@media (max-width: 900px) {
  #app {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr auto;
  }
  #sidebar, #playlist-panel { display: none; }
  #album-art-wrap { width: min(240px, 60vw); height: min(240px, 60vw); }
}

/* Toast */
#toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: var(--card);
  box-shadow: 6px 6px 16px var(--neumorph-dark), -3px -3px 8px var(--neumorph-light);
  padding: 10px 24px; border-radius: 25px;
  font-size: 13px; color: var(--text);
  pointer-events: none; z-index: 100;
  opacity: 0; transition: opacity 0.3s;
}
</style>
</head>
<body>

<div id="app">

  <!-- ============ Sidebar ============ -->
  <div id="sidebar" class="nm-raised">
    <div id="sidebar-top">
      <div id="logo"><span class="icon">🎵</span>Neumusic</div>
      <div id="sidebar-stats">
        <span id="stat-total">歌曲: 0</span>
        <span id="stat-artists">艺术家: 0</span>
        <span id="stat-duration">总时长: 0:00</span>
      </div>
      <div id="lib-actions">
        <button class="accent-btn" onclick="scanFolder()" title="选择本地音乐文件夹">📂 扫描音乐文件夹</button>
        <input type="file" id="file-input" accept="audio/*" multiple hidden onchange="handleFileSelect(event)">
        <button class="accent-btn" style="background:linear-gradient(135deg,#6366f1,#8b5cf6)" onclick="document.getElementById('file-input').click()">🎶 选择音乐文件</button>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="nm-btn ctrl-btn-sm" onclick="toggleShuffle()" id="btn-shuffle" title="随机播放">🔀</button>
        <button class="nm-btn ctrl-btn-sm" onclick="toggleRepeat()" id="btn-repeat" title="列表循环">🔁</button>
      </div>
    </div>
    <div id="folder-tree"><div style="padding:8px;color:var(--text2);font-size:12px;">暂无文件夹</div></div>
  </div>

  <!-- ============ Main Player ============ -->
  <div id="main">
    <div id="album-art-wrap">
      <img id="album-art" src="" alt="" style="display:none">
      <div id="album-art-placeholder">💿</div>
      <div id="album-art-ring"></div>
    </div>
    <div id="track-info">
      <div id="track-title">未在播放</div>
      <div id="track-artist">加载音乐开始聆听</div>
    </div>
    <div id="progress-wrap">
      <span class="progress-time" id="time-cur">0:00</span>
      <div id="progress-bar-wrap">
        <input type="range" class="nm-slider" id="progress-bar" min="0" max="1000" value="0" oninput="seekTo(this.value/1000)">
      </div>
      <span class="progress-time" id="time-total">0:00</span>
    </div>
    <div id="controls">
      <button class="nm-btn ctrl-btn" onclick="prevTrack()">⏮</button>
      <button class="nm-btn ctrl-btn" id="btn-play" onclick="togglePlay()">▶</button>
      <button class="nm-btn ctrl-btn" onclick="nextTrack()">⏭</button>
    </div>
    <div id="vol-wrap">
      <span style="font-size:14px;">🔊</span>
      <input type="range" class="nm-slider" id="vol-slider" min="0" max="100" value="70" oninput="setVolume(this.value/100)">
    </div>
    <canvas id="viz-canvas"></canvas>
  </div>

  <!-- ============ Playlist ============ -->
  <div id="playlist-panel" class="nm-raised">
    <div id="playlist-header">
      <span>🎵 播放队列</span>
      <span id="playlist-count" style="font-size:11px;color:var(--text2);">0 首</span>
    </div>
    <div id="search-wrap"><input class="nm-input" id="search-input" placeholder="🔍 搜索歌曲、艺术家..." oninput="filterTracks()"></div>
    <div id="playlist-scroll">
      <div id="empty-state">
        <span class="icon">📭</span>
        <span>点击上方按钮<br>加载你的本地音乐</span>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ==================== ID3 Tag Parser ====================
function parseID3(buffer) {
  const dv = new DataView(buffer);
  const meta = { title: null, artist: null, album: null, cover: null };
  try {
    // ID3v2
    if (dv.getUint8(0) === 0x49 && dv.getUint8(1) === 0x44 && dv.getUint8(2) === 0x33) {
      const ver = dv.getUint8(3);
      const flags = dv.getUint8(5);
      let size = ((dv.getUint8(6) & 0x7f) << 21) | ((dv.getUint8(7) & 0x7f) << 14)
               | ((dv.getUint8(8) & 0x7f) << 7) | (dv.getUint8(9) & 0x7f);
      let offset = 10;
      if (flags & 0x40) { offset += dv.getUint32(10); } // extended header
      const end = offset + size;
      while (offset + 10 < end) {
        const fid = String.fromCharCode.apply(null, new Uint8Array(buffer, offset, 4));
        const fsize = (dv.getUint8(offset+4) << 24) | (dv.getUint8(offset+5) << 16)
                    | (dv.getUint8(offset+6) << 8) | dv.getUint8(offset+7);
        offset += 10;
        if (offset + fsize > buffer.byteLength) break;
        const fdata = buffer.slice(offset, offset + fsize);
        const enc = (fdata.byteLength > 0) ? new Uint8Array(fdata)[0] : 0;
        let text = '';
        if (fid === 'APIC') {
          // Find image data after mime type
          const arr = new Uint8Array(fdata);
          let start = 1;
          while (start < arr.length && arr[start] !== 0) start++; // skip mime
          start++; // null byte
          if (start < arr.length && arr[start] === 3) start++;
          else start++; // picture type
          while (start < arr.length && arr[start] !== 0) start++; // skip description
          start++; // null
          meta.cover = new Blob([fdata.slice(start)], { type: 'image/jpeg' });
        } else if (fid === 'TIT2' || fid === 'TT2') {
          text = decodeID3Text(fdata, enc);
          if (text) meta.title = text;
        } else if (fid === 'TPE1' || fid === 'TP1') {
          text = decodeID3Text(fdata, enc);
          if (text) meta.artist = text;
        } else if (fid === 'TALB' || fid === 'TAL') {
          text = decodeID3Text(fdata, enc);
          if (text) meta.album = text;
        }
        offset += fsize;
      }
    }
    // ID3v1 (last 128 bytes)
    if (!meta.title) {
      const tail = new Uint8Array(buffer, Math.max(0, buffer.byteLength - 128), Math.min(128, buffer.byteLength));
      if (tail.length >= 128 && tail[0] === 0x54 && tail[1] === 0x41 && tail[2] === 0x47) {
        meta.title = readLatin1(tail, 3, 30);
        meta.artist = readLatin1(tail, 33, 30);
        meta.album = readLatin1(tail, 63, 30);
      }
    }
  } catch(e) { /* silent */ }
  return meta;
}

function decodeID3Text(data, enc) {
  const arr = new Uint8Array(data);
  let start = 1;
  try {
    if (enc === 1 && arr.length > 3 && arr[1] === 0xFF && arr[2] === 0xFE) {
      return new TextDecoder('utf-16le').decode(arr.slice(3));
    } else if (enc === 2) {
      return new TextDecoder('utf-16be').decode(arr.slice(1));
    } else if (enc === 3 || enc === 0) {
      return new TextDecoder('utf-8').decode(arr.slice(1));
    }
    return new TextDecoder('utf-8').decode(arr.slice(start));
  } catch(e) {
    return readLatin1(arr, start, arr.length - start);
  }
}

function readLatin1(arr, off, len) {
  let s = '';
  for (let i = off; i < Math.min(off + len, arr.length); i++) {
    if (arr[i] === 0) break;
    s += String.fromCharCode(arr[i]);
  }
  return s.trim();
}

// ==================== Audio Engine ====================
const audio = new Audio();
let audioCtx, analyser, sourceNode;
let playlist = [], currentIdx = -1, isPlaying = false;
let shuffleOn = false, repeatOn = false;
let favorites = new Set();
let volume = 0.7;
audio.volume = volume;

function initAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.8;
    sourceNode = audioCtx.createMediaElementSource(audio);
    sourceNode.connect(analyser);
    analyser.connect(audioCtx.destination);
  }
}

function loadTrack(idx) {
  if (idx < 0 || idx >= playlist.length) return;
  currentIdx = idx;
  const t = playlist[idx];
  if (t.blobUrl) URL.revokeObjectURL(t.blobUrl);
  t.blobUrl = URL.createObjectURL(t.file);
  audio.src = t.blobUrl;
  audio.load();
  initAudioCtx();
  updatePlayerUI();
  if (isPlaying) audio.play().catch(() => {});
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: t.title,
      artist: t.artist,
      album: t.album || 'Neumusic',
      artwork: [{ src: t.coverUrl || '', sizes: '300x300', type: 'image/jpeg' }]
    });
  }
}

function togglePlay() {
  initAudioCtx();
  if (!playlist.length) return;
  if (currentIdx < 0) loadTrack(0);
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
  } else {
    audio.play().catch(() => {});
    isPlaying = true;
  }
  updatePlayerUI();
}

function nextTrack() {
  if (!playlist.length) return;
  let next = currentIdx;
  if (shuffleOn) {
    next = Math.floor(Math.random() * playlist.length);
  } else {
    next = (currentIdx + 1) % playlist.length;
  }
  loadTrack(next);
  if (isPlaying) audio.play().catch(() => {});
}

function prevTrack() {
  if (!playlist.length) return;
  let prev = currentIdx;
  if (audio.currentTime > 3) {
    audio.currentTime = 0;
    return;
  }
  prev = (currentIdx - 1 + playlist.length) % playlist.length;
  loadTrack(prev);
  if (isPlaying) audio.play().catch(() => {});
}

function toggleShuffle() {
  shuffleOn = !shuffleOn;
  document.getElementById('btn-shuffle').style.color = shuffleOn ? 'var(--accent2)' : 'var(--text)';
  toast(shuffleOn ? '🔀 随机播放开启' : '🔀 随机播放关闭');
}

function toggleRepeat() {
  repeatOn = !repeatOn;
  document.getElementById('btn-repeat').style.color = repeatOn ? 'var(--accent2)' : 'var(--text)';
  toast(repeatOn ? '🔁 列表循环开启' : '🔁 列表循环关闭');
}

function setVolume(v) {
  volume = v; audio.volume = v;
}

function seekTo(fraction) {
  if (!audio.duration || isNaN(audio.duration)) return;
  audio.currentTime = fraction * audio.duration;
}

// ==================== Events ====================
audio.addEventListener('timeupdate', () => {
  if (!audio.duration || isNaN(audio.duration)) return;
  const pct = audio.currentTime / audio.duration;
  document.getElementById('progress-bar').value = Math.round(pct * 1000);
  document.getElementById('time-cur').textContent = fmtTime(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
  document.getElementById('time-total').textContent = fmtTime(audio.duration || 0);
  document.getElementById('progress-bar').max = 1000;
});

audio.addEventListener('ended', () => {
  if (repeatOn) {
    audio.currentTime = 0;
    audio.play().catch(() => {});
  } else {
    nextTrack();
  }
});

audio.addEventListener('play', () => { isPlaying = true; updatePlayerUI(); });
audio.addEventListener('pause', () => { isPlaying = false; updatePlayerUI(); });
audio.addEventListener('error', () => { nextTrack(); });

// ==================== Visualizer ====================
const vizCanvas = document.getElementById('viz-canvas');
const vizCtx = vizCanvas.getContext('2d');

function drawVisualizer() {
  requestAnimationFrame(drawVisualizer);
  const W = vizCanvas.width = vizCanvas.offsetWidth * 2;
  const H = vizCanvas.height = vizCanvas.offsetHeight * 2;
  vizCtx.clearRect(0, 0, W, H);

  if (!analyser) {
    // Draw idle bars
    const barCount = 40;
    const barW = W / barCount - 2;
    for (let i = 0; i < barCount; i++) {
      const h = 4 + Math.sin(Date.now()*0.002 + i*0.3) * 3;
      vizCtx.fillStyle = `rgba(139,92,246,0.2)`;
      vizCtx.beginPath();
      vizCtx.roundRect(i * (barW+2), H/2 - h/2, barW, h, 2);
      vizCtx.fill();
    }
    return;
  }

  const bufLen = analyser.frequencyBinCount;
  const dataArr = new Uint8Array(bufLen);
  analyser.getByteFrequencyData(dataArr);

  const barCount = 64;
  const step = Math.floor(bufLen / barCount);
  const barW = W / barCount - 2;
  const grad = vizCtx.createLinearGradient(0, H, 0, 0);
  grad.addColorStop(0, '#8b5cf6');
  grad.addColorStop(0.5, '#a78bfa');
  grad.addColorStop(1, '#ec4899');

  for (let i = 0; i < barCount; i++) {
    let sum = 0;
    for (let j = 0; j < step; j++) sum += dataArr[i * step + j] || 0;
    const avg = sum / step;
    const h = (avg / 255) * H * 0.9;
    const x = i * (barW + 2);
    vizCtx.fillStyle = grad;
    vizCtx.beginPath();
    vizCtx.roundRect(x, H - h, barW, h, [4, 4, 0, 0]);
    vizCtx.fill();
  }
}
drawVisualizer();

// ==================== Library Manager ====================
const audioExts = new Set(['mp3','wav','flac','ogg','m4a','aac','wma','opus','webm']);
let allTracks = [];

async function scanFolder() {
  try {
    const dirHandle = await window.showDirectoryPicker({ mode: 'read' });
    toast('🔍 正在扫描文件夹...');
    const files = [];
    await scanDir(dirHandle, files, '');
    await processFiles(files);
    toast(`✅ 已加载 ${files.length} 首歌曲`);
  } catch(e) {
    if (e.name !== 'AbortError') {
      toast('⚠️ 浏览器不支持或已取消');
      document.getElementById('file-input').click();
    }
  }
}

async function scanDir(dirHandle, files, prefix) {
  for await (const [name, entry] of dirHandle.entries()) {
    if (entry.kind === 'file') {
      const ext = name.split('.').pop().toLowerCase();
      if (audioExts.has(ext)) {
        files.push({ name: prefix + name, handle: entry });
      }
    } else if (entry.kind === 'directory') {
      await scanDir(entry, files, prefix + name + '/');
    }
  }
}

function handleFileSelect(event) {
  const inputFiles = event.target.files;
  if (!inputFiles.length) return;
  toast('🔍 正在解析文件...');
  const files = [];
  for (const f of inputFiles) {
    const ext = f.name.split('.').pop().toLowerCase();
    if (audioExts.has(ext)) {
      files.push({ name: f.webkitRelativePath || f.name, file: f });
    }
  }
  processFilesDirect(files);
}

async function processFiles(files) {
  const tracks = [];
  for (const f of files) {
    try {
      const file = await f.handle.getFile();
      tracks.push({ name: f.name, file });
    } catch(e) { /* skip */ }
  }
  processFilesDirect(tracks);
}

async function processFilesDirect(tracks) {
  const results = [];
  for (const t of tracks) {
    try {
      const buffer = await t.file.arrayBuffer();
      const meta = parseID3(buffer);
      const name = t.name.replace(/\.[^.]+$/, '');
      const title = meta.title || name;
      const artist = meta.artist || '未知艺术家';
      const album = meta.album || '未知专辑';
      let coverUrl = '';
      if (meta.cover) {
        coverUrl = URL.createObjectURL(meta.cover);
      }
      // Get duration
      const audioEl = new Audio();
      audioEl.src = URL.createObjectURL(t.file);
      const duration = await new Promise(resolve => {
        audioEl.addEventListener('loadedmetadata', () => resolve(audioEl.duration || 0), {once: true});
        audioEl.addEventListener('error', () => resolve(0), {once: true});
        setTimeout(() => resolve(0), 3000);
      });
      URL.revokeObjectURL(audioEl.src);

      results.push({
        id: crypto.randomUUID(),
        title, artist, album,
        duration, coverUrl,
        file: t.file,
        path: t.name,
        addedAt: Date.now()
      });
    } catch(e) { /* skip */ }
  }

  // Merge: don't duplicate
  const existing = new Set(allTracks.map(t => t.path));
  for (const r of results) {
    if (!existing.has(r.path)) allTracks.push(r);
  }
  updateStats();
  renderPlaylist();
  if (!playlist.length) filterTracks();
}

function updateStats() {
  document.getElementById('stat-total').textContent = `歌曲: ${allTracks.length}`;
  const artists = new Set(allTracks.map(t => t.artist));
  document.getElementById('stat-artists').textContent = `艺术家: ${artists.size}`;
  const totalSec = allTracks.reduce((s, t) => s + t.duration, 0);
  document.getElementById('stat-duration').textContent = `总时长: ${fmtTime(totalSec)}`;

  // Folder tree
  const folders = {};
  for (const t of allTracks) {
    const parts = t.path.split('/');
    if (parts.length < 2) {
      folders['根目录'] = (folders['根目录'] || 0) + 1;
    } else {
      folders[parts.slice(0, -1).join('/')] = (folders[parts.slice(0, -1).join('/')] || 0) + 1;
    }
  }
  const treeEl = document.getElementById('folder-tree');
  if (Object.keys(folders).length) {
    treeEl.innerHTML = Object.entries(folders).map(([name, count]) =>
      `<div class="folder-item" onclick="filterByFolder('${name.replace(/'/g, "\\'")}')">📁 ${name}<span class="folder-count">${count}</span></div>`
    ).join('');
  }
}

let currentFilter = '';
let currentFolder = '';

function filterTracks() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  currentFilter = q;
  let filtered = allTracks;
  if (currentFolder) {
    filtered = filtered.filter(t => {
      const parts = t.path.split('/');
      const folder = parts.length < 2 ? '根目录' : parts.slice(0, -1).join('/');
      return folder === currentFolder;
    });
  }
  if (q) {
    filtered = filtered.filter(t =>
      t.title.toLowerCase().includes(q) ||
      t.artist.toLowerCase().includes(q) ||
      t.album.toLowerCase().includes(q)
    );
  }
  playlist = filtered;
  renderPlaylist();
  if (currentIdx >= playlist.length && playlist.length > 0) {
    loadTrack(0);
  }
}

function filterByFolder(name) {
  currentFolder = (currentFolder === name) ? '' : name;
  document.querySelectorAll('.folder-item').forEach(el => {
    el.classList.toggle('active', el.textContent.includes(name) && currentFolder === name);
  });
  filterTracks();
}

function renderPlaylist() {
  const el = document.getElementById('playlist-scroll');
  document.getElementById('playlist-count').textContent = `${playlist.length} 首`;
  if (!playlist.length) {
    el.innerHTML = `<div id="empty-state"><span class="icon">📭</span><span>没有匹配的歌曲</span></div>`;
    return;
  }
  el.innerHTML = playlist.map((t, i) => {
    const isActive = t.id === (playlist[currentIdx]?.id);
    const liked = favorites.has(t.id);
    return `
    <div class="track-item${isActive ? ' active' : ''}" ondblclick="playTrack(${i})">
      <span class="t-idx">${isActive ? '▶' : i+1}</span>
      ${t.coverUrl ? `<img class="t-cover" src="${t.coverUrl}" onerror="this.style.display='none'">` : `<div class="t-cover" style="display:flex;align-items:center;justify-content:center;font-size:16px;">🎵</div>`}
      <div class="t-meta" onclick="playTrack(${i})">
        <div class="t-name">${escHtml(t.title)}</div>
        <div class="t-art">${escHtml(t.artist)} · ${escHtml(t.album)}</div>
      </div>
      <span class="t-dur">${fmtTime(t.duration)}</span>
      <span class="t-fav${liked?' liked':''}" onclick="event.stopPropagation();toggleFav('${t.id}')">${liked ? '❤️' : '🤍'}</span>
    </div>`;
  }).join('');
}

function playTrack(idx) {
  loadTrack(idx);
  isPlaying = true;
  audio.play().catch(() => {});
  updatePlayerUI();
  renderPlaylist();
}

function toggleFav(id) {
  if (favorites.has(id)) favorites.delete(id);
  else favorites.add(id);
  renderPlaylist();
}

function updatePlayerUI() {
  const btn = document.getElementById('btn-play');
  btn.textContent = isPlaying ? '⏸' : '▶';
  const art = document.getElementById('album-art');
  const placeholder = document.getElementById('album-art-placeholder');
  const ring = document.getElementById('album-art-ring');

  if (currentIdx >= 0 && playlist[currentIdx]) {
    const t = playlist[currentIdx];
    document.getElementById('track-title').textContent = t.title;
    document.getElementById('track-artist').textContent = `${t.artist} · ${t.album}`;
    if (t.coverUrl) {
      art.src = t.coverUrl;
      art.style.display = 'block';
      placeholder.style.display = 'none';
    } else {
      art.style.display = 'none';
      placeholder.style.display = 'flex';
    }
  }
  art.classList.toggle('playing', isPlaying);
  ring.classList.toggle('active', isPlaying);
  document.getElementById('vol-slider').value = Math.round(volume * 100);
}

// ==================== Utils ====================
function fmtTime(sec) {
  if (!sec || isNaN(sec)) return '0:00';
  const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

// ==================== Keyboard ====================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.code) {
    case 'Space': e.preventDefault(); togglePlay(); break;
    case 'ArrowRight': e.ctrlKey ? nextTrack() : (audio.currentTime += 5); break;
    case 'ArrowLeft': e.ctrlKey ? prevTrack() : (audio.currentTime -= 5); break;
    case 'ArrowUp': setVolume(Math.min(1, volume + 0.1)); document.getElementById('vol-slider').value = Math.round(volume*100); break;
    case 'ArrowDown': setVolume(Math.max(0, volume - 0.1)); document.getElementById('vol-slider').value = Math.round(volume*100); break;
    case 'KeyM': audio.muted = !audio.muted; toast(audio.muted ? '🔇 静音' : '🔊 取消静音'); break;
    case 'KeyS': toggleShuffle(); break;
    case 'KeyR': toggleRepeat(); break;
  }
});

// Init vol slider
document.getElementById('vol-slider').value = 70;
</script>
