<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>星际征途 · Space Odyssey</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#000;
    overflow:hidden;
    touch-action:none;
    user-select:none;
    -webkit-user-select:none;
    font-family:'Courier New',monospace;
  }
  canvas { display:block; }
  #ui {
    position:fixed; top:0; left:0; width:100%;
    pointer-events:none; z-index:10;
    padding:16px; color:#fff;
  }
  #score-panel {
    display:flex; justify-content:space-between;
    font-size:14px; letter-spacing:2px;
    text-shadow:0 0 10px #0ff,0 0 20px #0ff;
  }
  #score-panel span { color:#0ff; }
  #lives { color:#f0f; text-shadow:0 0 10px #f0f,0 0 20px #f0f; }
  #message {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    font-size:24px; color:#fff; text-align:center;
    text-shadow:0 0 20px #0ff,0 0 40px #0ff,0 0 80px #f0f;
    pointer-events:none; z-index:20;
    letter-spacing:4px; line-height:1.8;
  }
  #message .title { font-size:48px; display:block; margin-bottom:8px; }
  #message .sub { font-size:14px; color:#0ff; }
  #message .tap { font-size:16px; color:#f0f; animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
  #controls {
    position:fixed; bottom:24px; width:100%;
    display:flex; justify-content:center; gap:12px;
    z-index:10; pointer-events:none;
  }
  #controls button {
    pointer-events:auto; width:64px; height:64px;
    border-radius:50%; border:2px solid rgba(0,255,255,0.4);
    background:rgba(0,255,255,0.08); color:#0ff;
    font-size:24px; cursor:pointer;
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    transition:all 0.15s;
  }
  #controls button:active { background:rgba(0,255,255,0.3); border-color:#0ff; box-shadow:0 0 20px #0ff; }
  #fire-btn {
    width:80px !important; height:80px !important;
    font-size:32px !important; border-color:rgba(255,0,255,0.6) !important;
    background:rgba(255,0,255,0.12) !important;
    color:#f0f !important;
  }
  #fire-btn:active { background:rgba(255,0,255,0.35) !important; box-shadow:0 0 30px #f0f !important; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div id="score-panel">
    <span>⭐ <span id="score">0</span></span>
    <span>🔥 <span id="combo">x1</span></span>
    <span>🏆 <span id="hiscore">0</span></span>
  </div>
  <span id="lives"></span>
</div>

<div id="message">
  <span class="title">星 际 征 途</span>
  <span class="sub">SPACE ODYSSEY</span>
  <br><br>
  <span class="tap">👆 点击或按空格开始</span>
  <br>
  <span style="font-size:12px;color:#555;">← → 移动 | 空格 射击 | P 暂停 | G 无敌</span>
</div>

<div id="controls">
  <button id="btn-left">◀</button>
  <button id="btn-fire">▼</button>
  <button id="btn-right">▶</button>
</div>

<script>
// ==================== Audio Engine ====================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playSound(freq, type, duration, vol=0.08, glide=0, pan=0) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const panner = audioCtx.createStereoPanner();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  if (glide) osc.frequency.linearRampToValueAtTime(freq + glide, t + duration);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  panner.pan.setValueAtTime(pan, t);
  osc.connect(gain);
  gain.connect(panner);
  panner.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + duration);
}

function sfxShoot() { playSound(800, 'square', 0.08, 0.05, -400); }
function sfxHit() { playSound(200, 'sawtooth', 0.15, 0.06, -100); }
function sfxExplosion() { playSound(60, 'sawtooth', 0.3, 0.1, -30); }
function sfxPowerUp() { playSound(600, 'triangle', 0.2, 0.1, 600); }
function sfxPlayerHit() { playSound(40, 'sawtooth', 0.4, 0.25, -20); }
function sfxWave() { playSound(300, 'square', 0.15, 0.08, 200); }

// ==================== Canvas Setup ====================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ==================== Game State ====================
const STATE = { MENU:0, PLAYING:1, PAUSED:2, OVER:3 };
let state = STATE.MENU;
let score = 0, hiScore = 0, combo = 1, comboTimer = 0;
let lives = 3;
let wave = 1, waveTimer = 0;
let shakeX = 0, shakeY = 0, shakeDur = 0;
let stars = [];
let particles = [];
let enemies = [];
let bullets = [];
let enemyBullets = [];
let powerUps = [];
let player, keys = {};

// Load hiScore
try { hiScore = parseInt(localStorage.getItem('spaceOdysseyHi')) || 0; } catch(e) {}
document.getElementById('hiscore').textContent = hiScore;

// ==================== Starfield ====================
function initStars() {
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      z: Math.random() * 3 + 0.5,
      hue: Math.random() < 0.1 ? 200 : Math.random() < 0.1 ? 300 : 0
    });
  }
}

// ==================== Player ====================
function createPlayer() {
  return {
    x: W / 2, y: H - 100, w: 36, h: 40,
    speed: 6, fireCooldown: 0, fireRate: 12,
    invincible: 0, engineGlow: 0
  };
}

// ==================== Enemies ====================
function spawnWave() {
  enemies = [];
  const rows = Math.min(3 + Math.floor(wave / 2), 7);
  const cols = Math.min(6 + wave, 12);
  const spacingX = Math.min(50, (W - 80) / cols);
  const spacingY = 44;
  const startY = 60 + wave * 8;
  const types = ['basic', 'fast', 'tank'];

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const type = r === 0 && wave > 2 ? 'tank' :
                   r === rows - 1 && wave > 1 ? 'fast' : 'basic';
      const hue = type === 'tank' ? 0 : type === 'fast' ? 50 : 200 + r * 20;
      enemies.push({
        x: 60 + c * spacingX,
        y: startY + r * spacingY,
        w: type === 'tank' ? 36 : 28,
        h: type === 'tank' ? 36 : 28,
        type, hue,
        baseX: 60 + c * spacingX,
        speed: 0.6 + wave * 0.15 + (type === 'fast' ? 0.8 : 0),
        hp: type === 'tank' ? 3 : 1,
        maxHp: type === 'tank' ? 3 : 1,
        points: type === 'tank' ? 300 : type === 'fast' ? 150 : 100,
        bobOffset: Math.random() * Math.PI * 2,
        shootTimer: Math.random() * 120 + 60 - wave * 2,
        shootCooldown: Math.max(30, 120 - wave * 5)
      });
    }
  }
  sfxWave();
}

// ==================== Particles ====================
function spawnParticles(x, y, count, hue, spread=3, life=20) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * spread;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life, maxLife: life,
      hue: hue + Math.random() * 40 - 20,
      size: Math.random() * 2.5 + 1
    });
  }
}

function spawnExplosion(x, y, size) {
  const count = 20 + size * 2;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * size * 0.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 25 + Math.random() * 20,
      maxLife: 45,
      hue: Math.random() < 0.5 ? 30 : Math.random() < 0.5 ? 200 : 300,
      size: Math.random() * 3 + 1
    });
  }
}

// ==================== Bullets ====================
function playerShoot() {
  if (player.fireCooldown > 0) return;
  player.fireCooldown = player.fireRate;
  bullets.push({ x: player.x - 6, y: player.y - 20, vy: -10, hue: 200, trail: [] });
  bullets.push({ x: player.x + 6, y: player.y - 20, vy: -10, hue: 200, trail: [] });
  sfxShoot();
}

function enemyShoot(e) {
  enemyBullets.push({ x: e.x, y: e.y + e.h / 2, vy: 3 + wave * 0.3, hue: e.hue });
}

// ==================== Power-ups ====================
function spawnPowerUp(x, y) {
  if (Math.random() < 0.15) {
    const types = ['rapid', 'shield', 'spread'];
    const type = types[Math.floor(Math.random() * types.length)];
    powerUps.push({ x, y, vy: 1.5, type, life: 400, hue: type === 'rapid' ? 60 : type === 'shield' ? 200 : 300 });
  }
}

// ==================== Input ====================
let godMode = false;

window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'ArrowUp') {
    e.preventDefault();
    if (state === STATE.MENU) startGame();
  }
  if (e.key === 'p' || e.key === 'P') {
    if (state === STATE.PLAYING) state = STATE.PAUSED;
    else if (state === STATE.PAUSED) state = STATE.PLAYING;
  }
  if (e.key === 'g' || e.key === 'G') {
    godMode = !godMode;
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('click', () => { if (state === STATE.MENU) startGame(); });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === STATE.MENU) startGame();
});

// Mobile buttons
const btnLeft = document.getElementById('btn-left');
const btnRight = document.getElementById('btn-right');
const btnFire = document.getElementById('btn-fire');

function setupBtn(el, key) {
  el.addEventListener('pointerdown', e => { e.preventDefault(); keys[key] = true; });
  el.addEventListener('pointerup', e => { e.preventDefault(); keys[key] = false; });
  el.addEventListener('pointerleave', () => { keys[key] = false; });
}
setupBtn(btnLeft, 'ArrowLeft');
setupBtn(btnRight, 'ArrowRight');
setupBtn(btnFire, ' ');

// Also touch/drag on canvas for movement
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state !== STATE.PLAYING) return;
  const touch = e.touches[0];
  player.x = touch.clientX;
}, {passive: false});

// ==================== Game Functions ====================
function startGame() {
  initAudio();
  state = STATE.PLAYING;
  score = 0; lives = 3; wave = 1; combo = 1;
  player = createPlayer();
  enemies = []; bullets = []; enemyBullets = []; powerUps = []; particles = [];
  spawnWave();
  updateUI();
  document.getElementById('message').style.display = 'none';
}

function gameOver() {
  state = STATE.OVER;
  sfxPlayerHit();
  spawnExplosion(player.x, player.y, 15);
  player = null;
  if (score > hiScore) {
    hiScore = score;
    try { localStorage.setItem('spaceOdysseyHi', hiScore); } catch(e) {}
  }
  document.getElementById('hiscore').textContent = hiScore;
  const msg = document.getElementById('message');
  msg.innerHTML = `<span class="title" style="font-size:36px">舰 队 覆 灭</span>
    <span class="sub">最终得分: ${score}</span>
    <br><span class="tap">👆 点击重新开始</span>`;
  msg.style.display = 'block';
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('combo').textContent = `x${combo}`;
  document.getElementById('hiscore').textContent = hiScore;
  document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0, lives));
}

// ==================== Draw Functions ====================
function drawStars() {
  stars.forEach(s => {
    s.y += s.z * 1.5;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    const alpha = 0.4 + s.z * 0.2;
    if (s.hue) {
      ctx.fillStyle = `hsla(${s.hue},100%,70%,${alpha})`;
    } else {
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.z * 0.8, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawPlayer() {
  if (!player) return;
  const p = player;
  const alpha = p.invincible > 0 ? 0.4 + Math.sin(Date.now() * 0.05) * 0.3 : 1;

  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.globalAlpha = alpha;

  // Engine glow
  const glow = 0.6 + Math.sin(Date.now() * 0.02) * 0.4;
  const grd = ctx.createRadialGradient(0, 22, 2, 0, 22, 20);
  grd.addColorStop(0, `rgba(0,180,255,${glow})`);
  grd.addColorStop(0.5, `rgba(0,100,255,${glow * 0.5})`);
  grd.addColorStop(1, 'rgba(0,50,255,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(0, 22, 20, 0, Math.PI * 2);
  ctx.fill();

  // Engine flame
  ctx.fillStyle = `rgba(0,200,255,${glow})`;
  ctx.beginPath();
  ctx.moveTo(-8, 18);
  ctx.lineTo(0, 26 + Math.random() * 8);
  ctx.lineTo(8, 18);
  ctx.fill();

  // Body
  const bodyGrd = ctx.createLinearGradient(0, -20, 0, 15);
  bodyGrd.addColorStop(0, '#e0f0ff');
  bodyGrd.addColorStop(0.3, '#80c8ff');
  bodyGrd.addColorStop(0.7, '#2060a0');
  bodyGrd.addColorStop(1, '#103060');
  ctx.fillStyle = bodyGrd;
  ctx.beginPath();
  ctx.moveTo(0, -22);
  ctx.lineTo(-14, -4);
  ctx.lineTo(-10, 16);
  ctx.lineTo(-18, 10);
  ctx.lineTo(0, 20);
  ctx.lineTo(18, 10);
  ctx.lineTo(10, 16);
  ctx.lineTo(14, -4);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  const cockpitGrd = ctx.createRadialGradient(0, -6, 2, 0, -4, 8);
  cockpitGrd.addColorStop(0, '#c0f0ff');
  cockpitGrd.addColorStop(1, '#3070b0');
  ctx.fillStyle = cockpitGrd;
  ctx.beginPath();
  ctx.ellipse(0, -6, 6, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing accents
  ctx.strokeStyle = 'rgba(0,255,255,0.6)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-4, 0);
  ctx.lineTo(-16, 8);
  ctx.moveTo(4, 0);
  ctx.lineTo(16, 8);
  ctx.stroke();

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y + Math.sin(e.bobOffset + Date.now() * 0.005) * 4);

  const hue = e.hue;

  // Glow
  const grd = ctx.createRadialGradient(0, 0, e.w * 0.3, 0, 0, e.w * 0.9);
  grd.addColorStop(0, `hsla(${hue},100%,60%,0.3)`);
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(0, 0, e.w * 0.9, 0, Math.PI * 2);
  ctx.fill();

  // HP bar for tanks
  if (e.maxHp > 1) {
    ctx.fillStyle = 'rgba(255,0,0,0.5)';
    ctx.fillRect(-e.w / 2, -e.h / 2 - 6, e.w, 3);
    ctx.fillStyle = '#0f0';
    ctx.fillRect(-e.w / 2, -e.h / 2 - 6, e.w * (e.hp / e.maxHp), 3);
  }

  // Body
  const bodyGrd = ctx.createLinearGradient(0, -e.h / 2, 0, e.h / 2);
  bodyGrd.addColorStop(0, `hsl(${hue},80%,70%)`);
  bodyGrd.addColorStop(0.5, `hsl(${hue},80%,45%)`);
  bodyGrd.addColorStop(1, `hsl(${hue},60%,25%)`);
  ctx.fillStyle = bodyGrd;

  if (e.type === 'tank') {
    // Hexagonal tank
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 3 * i - Math.PI / 6;
      const r = e.w / 2;
      ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = `hsl(${hue},100%,70%)`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Inner core
    ctx.fillStyle = `hsl(${hue},100%,80%)`;
    ctx.beginPath();
    ctx.arc(0, 0, e.w * 0.25, 0, Math.PI * 2);
    ctx.fill();
  } else if (e.type === 'fast') {
    // Diamond fast enemy
    ctx.beginPath();
    ctx.moveTo(0, -e.h / 2);
    ctx.lineTo(e.w / 2, 0);
    ctx.lineTo(0, e.h / 2);
    ctx.lineTo(-e.w / 2, 0);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = `hsl(${hue},100%,70%)`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  } else {
    // Round basic enemy
    ctx.beginPath();
    ctx.arc(0, 0, e.w / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = `hsl(${hue},100%,65%)`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-5, -3, 4, 0, Math.PI * 2);
    ctx.arc(5, -3, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-5, -3, 2, 0, Math.PI * 2);
    ctx.arc(5, -3, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawBullet(b) {
  // Trail
  if (!b.trail) b.trail = [];
  b.trail.push({ x: b.x, y: b.y });
  if (b.trail.length > 6) b.trail.shift();

  for (let i = 0; i < b.trail.length; i++) {
    const t = b.trail[i];
    const alpha = i / b.trail.length * 0.4;
    ctx.fillStyle = `hsla(${b.hue},100%,60%,${alpha})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Bullet
  const grd = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, 4);
  grd.addColorStop(0, '#fff');
  grd.addColorStop(0.4, `hsl(${b.hue},100%,70%)`);
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
  ctx.fill();
}

function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = `hsla(${p.hue},100%,60%,${alpha})`;
    ctx.shadowColor = `hsl(${p.hue},100%,60%)`;
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

function drawPowerUp(p) {
  const t = Date.now() * 0.005;
  const glow = 0.5 + Math.sin(t) * 0.3;
  ctx.save();
  ctx.translate(p.x, p.y + Math.sin(t * 2) * 8);

  // Glow ring
  ctx.strokeStyle = `hsla(${p.hue},100%,60%,${glow})`;
  ctx.lineWidth = 2;
  ctx.shadowColor = `hsl(${p.hue},100%,60%)`;
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(0, 0, 14, 0, Math.PI * 2);
  ctx.stroke();

  // Icon
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 6;
  const icon = p.type === 'rapid' ? '⚡' : p.type === 'shield' ? '🛡' : '💠';
  ctx.fillText(icon, 0, 0);
  ctx.shadowBlur = 0;

  ctx.restore();
}

// ==================== Collision ====================
function rectCollide(a, b) {
  const aw = a.w || 6, ah = a.h || 10;
  const bw = b.w || 6, bh = b.h || 10;
  return Math.abs(a.x - b.x) < (aw + bw) / 2 &&
         Math.abs(a.y - b.y) < (ah + bh) / 2;
}

// ==================== Update ====================
function update() {
  if (state !== STATE.PLAYING) return;

  // Player movement
  if (player) {
    if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
    player.x = Math.max(20, Math.min(W - 20, player.x));

    if ((keys[' '] || keys['ArrowUp'] || keys['w']) && player.fireCooldown <= 0) {
      playerShoot();
    }
    if (player.fireCooldown > 0) player.fireCooldown--;
    if (player.invincible > 0) player.invincible--;
  }

  // Update bullets
  bullets.forEach(b => {
    b.y += b.vy;
    if (!b.trail) b.trail = [];
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 6) b.trail.shift();
  });
  bullets = bullets.filter(b => b.y > -20);

  enemyBullets.forEach(b => b.y += b.vy);
  enemyBullets = enemyBullets.filter(b => b.y < H + 20);

  // Update enemies
  let allDead = true;
  enemies.forEach(e => {
    e.bobOffset += 0.02;
    e.x = e.baseX + Math.sin(e.bobOffset + Date.now() * 0.002) * 20;
    e.y += (wave * 0.05);

    e.shootTimer--;
    if (e.shootTimer <= 0 && player) {
      enemyShoot(e);
      e.shootTimer = e.shootCooldown + Math.random() * 40;
    }

    if (e.hp > 0) allDead = false;
  });

  if (allDead && enemies.length > 0) {
    wave++;
    spawnWave();
    if (player) {
      player.fireRate = Math.max(6, 12 - wave);
    }
  }

  // Collision: player bullets vs enemies
  for (let i = bullets.length - 1; i >= 0; i--) {
    for (let j = enemies.length - 1; j >= 0; j--) {
      if (enemies[j].hp <= 0) continue;
      if (rectCollide(bullets[i], enemies[j])) {
              enemies[j].hp = godMode ? 0 : enemies[j].hp - 1;
        bullets.splice(i, 1);
        if (enemies[j].hp <= 0) {
          spawnExplosion(enemies[j].x, enemies[j].y, 8);
          score += enemies[j].points * combo;
          combo++;
          comboTimer = 90;
          spawnPowerUp(enemies[j].x, enemies[j].y);
          sfxHit();
          shakeDur = 4;
        } else {
          spawnParticles(enemies[j].x, enemies[j].y, 6, enemies[j].hue, 2, 10);
        }
        break;
      }
    }
  }

  // Collision: enemy bullets vs player
  if (player && player.invincible <= 0 && !godMode) {
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      if (rectCollide(enemyBullets[i], { x: player.x, y: player.y, w: 20, h: 24 })) {
        enemyBullets.splice(i, 1);
        lives--;
        updateUI();
        sfxPlayerHit();
        spawnExplosion(player.x, player.y, 10);
        shakeDur = 10;
        player.invincible = 90;
        combo = Math.max(1, combo - 2);
        if (lives <= 0) { gameOver(); return; }
        break;
      }
    }

    // Collision: enemies vs player
    if (!godMode) {
    for (const e of enemies) {
      if (e.hp <= 0) continue;
      if (rectCollide({ x: player.x, y: player.y, w: 20, h: 24 }, e)) {
        e.hp = 0;
        spawnExplosion(e.x, e.y, 8);
        lives--;
        updateUI();
        sfxPlayerHit();
        shakeDur = 10;
        player.invincible = 90;
        combo = Math.max(1, combo - 2);
        if (lives <= 0) { gameOver(); return; }
        break;
      }
    }
    }
  }

  // Power-ups
  powerUps.forEach(p => { p.y += p.vy; p.life--; });
  if (player) {
    for (let i = powerUps.length - 1; i >= 0; i--) {
      const p = powerUps[i];
      if (rectCollide({ x: player.x, y: player.y, w: 24, h: 28 }, { x: p.x, y: p.y, w: 20, h: 20 })) {
        if (p.type === 'rapid') player.fireRate = Math.max(4, player.fireRate - 4);
        if (p.type === 'shield') player.invincible = Math.min(300, player.invincible + 120);
        if (p.type === 'spread') score += 500;
        sfxPowerUp();
        spawnParticles(p.x, p.y, 12, p.hue, 4);
        powerUps.splice(i, 1);
      }
    }
  }
  powerUps = powerUps.filter(p => p.life > 0 && p.y < H + 40);

  // Combo timer
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer === 0) combo = 1;
  }

  // Shake
  if (shakeDur > 0) {
    shakeX = (Math.random() - 0.5) * shakeDur * 1.5;
    shakeY = (Math.random() - 0.5) * shakeDur * 1.5;
    shakeDur--;
  } else { shakeX = 0; shakeY = 0; }

  // Particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; });
  particles = particles.filter(p => p.life > 0);

  updateUI();
}

// ==================== Render ====================
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bgGrd = ctx.createLinearGradient(0, 0, 0, H);
  bgGrd.addColorStop(0, '#000011');
  bgGrd.addColorStop(0.5, '#000022');
  bgGrd.addColorStop(1, '#001030');
  ctx.fillStyle = bgGrd;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawStars();

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(0,100,200,0.06)';
  ctx.lineWidth = 1;
  const gridSize = 60;
  const offset = (Date.now() * 0.02) % gridSize;
  for (let x = offset; x < W; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }

  // Draw power-ups
  powerUps.forEach(drawPowerUp);

  // Draw enemies
  enemies.filter(e => e.hp > 0).forEach(drawEnemy);

  // Draw enemy bullets
  enemyBullets.forEach(b => {
    const grd = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, 3);
    grd.addColorStop(0, `hsl(${b.hue},100%,80%)`);
    grd.addColorStop(0.5, `hsl(${b.hue},100%,50%)`);
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
    ctx.fill();
  });

  // Draw player bullets
  bullets.forEach(drawBullet);

  // Draw player
  drawPlayer();

  // Draw particles
  drawParticles();

  ctx.restore();

  // Wave indicator
  if (state === STATE.PLAYING) {
    ctx.fillStyle = godMode ? 'rgba(255,215,0,0.8)' : 'rgba(0,255,255,0.3)';
    ctx.font = '12px "Courier New",monospace';
    ctx.textAlign = 'right';
    ctx.fillText(`WAVE ${wave}` + (godMode ? ' 👑' : ''), W - 16, 36);
  }

  // Pause overlay
  if (state === STATE.PAUSED) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#0ff';
    ctx.font = '28px "Courier New",monospace';
    ctx.textAlign = 'center';
    ctx.fillText('⏸ 已暂停', W / 2, H / 2);
    ctx.font = '14px "Courier New",monospace';
    ctx.fillText('按 P 继续', W / 2, H / 2 + 36);
  }

  // Mobile controls visibility
  const isMobile = 'ontouchstart' in window;
  document.getElementById('controls').style.display = isMobile && state === STATE.PLAYING ? 'flex' : 'none';
}

// ==================== Game Loop ====================
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Init
initStars();
player = createPlayer();
loop();
</script>
