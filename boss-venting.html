<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>老板发泄屋 💢</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#1a1a2e; overflow:hidden; touch-action:none;
  user-select:none; -webkit-user-select:none;
  font-family:'PingFang SC','Microsoft YaHei',sans-serif;
}
canvas { display:block; }
#ui {
  position:fixed; top:0; left:0; width:100%; pointer-events:none; z-index:10;
  padding:12px 16px; color:#fff;
}
#top-bar {
  display:flex; justify-content:space-between; align-items:center;
  font-size:13px; letter-spacing:1px;
}
#top-bar span { padding:4px 10px; border-radius:12px; }
#fury { background:rgba(255,50,50,0.4); color:#f66; }
#gold { background:rgba(255,200,0,0.4); color:#fd0; }
#boss-name { background:rgba(255,255,255,0.1); color:#ccc; }
#toolbar {
  position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
  display:flex; gap:10px; z-index:10; pointer-events:auto;
  flex-wrap:wrap; justify-content:center; max-width:95vw;
}
#toolbar button {
  padding:10px 14px; border-radius:20px; border:none;
  font-size:14px; cursor:pointer; font-weight:bold;
  transition:all 0.15s; letter-spacing:1px;
  white-space:nowrap;
}
#toolbar button:active { transform:scale(0.92); }
.btn-task { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; }
.btn-whip { background:linear-gradient(135deg,#f093fb,#f5576c); color:#fff; font-size:16px !important; }
.btn-kick { background:linear-gradient(135deg,#fa709a,#fee140); color:#333; font-size:16px !important; }
.btn-scold { background:linear-gradient(135deg,#a18cd1,#fbc2eb); color:#333; font-size:16px !important; }
.btn-fire { background:linear-gradient(135deg,#ff0844,#ffb199); color:#fff; font-size:16px !important; }
.btn-newboss { background:linear-gradient(135deg,#0ba360,#3cba92); color:#fff; }

#msg-pop {
  position:fixed; top:35%; left:50%; transform:translate(-50%,-50%);
  font-size:28px; font-weight:bold; pointer-events:none; z-index:20;
  text-align:center; text-shadow:0 0 30px rgba(255,255,0,1),0 0 60px rgba(255,100,0,0.8);
  opacity:0; transition:opacity 0.3s;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div id="top-bar">
    <span id="fury">😡 怒气: 0</span>
    <span id="boss-name">👔 老板 #1</span>
    <span id="gold">💼 炒鱿鱼: 0</span>
  </div>
</div>

<div id="msg-pop"></div>

<div id="toolbar">
  <button class="btn-task" onclick="assignTask()">📋 安排任务</button>
  <button class="btn-whip" onclick="punishBoss('whip')">🔨 大锤子</button>
  <button class="btn-kick" onclick="punishBoss('kick')">🦵 金刚腿</button>
  <button class="btn-scold" onclick="punishBoss('scold')">🦁 狮吼功</button>
  <button class="btn-fire" onclick="fireBoss()">🔥 炒鱿鱼</button>
</div>

<script>
// ==================== Audio ====================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function sfx(freq, type, dur, vol=0.08, glide=0) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  if (glide) o.frequency.linearRampToValueAtTime(freq+glide, t+dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t+dur);
}

function sfxRumble(dur, vol=0.1) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*dur, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i=0; i<data.length; i++) {
    data[i] = (Math.random()*2-1) * Math.pow(1 - i/data.length, 2);
  }
  const src = audioCtx.createBufferSource();
  const g = audioCtx.createGain();
  const flt = audioCtx.createBiquadFilter();
  src.buffer = buf;
  flt.type = 'lowpass'; flt.frequency.setValueAtTime(200, t);
  flt.frequency.linearRampToValueAtTime(30, t+dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  src.connect(flt); flt.connect(g); g.connect(audioCtx.destination);
  src.start(t); src.stop(t+dur);
}

// ==================== Canvas ====================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W=canvas.width=innerWidth; H=canvas.height=innerHeight; }
resize(); window.addEventListener('resize', resize);

// ==================== Game State ====================
let fury = 0, gold = 0, bossNum = 1;
let particles = [], floatingTexts = [];
let boss, task = null;
let shakeX = 0, shakeY = 0, shakeDur = 0;
let bossDefeated = false;
let activeEffect = null; // { type, timer, phase }
let screenFlash = 0;
let floorCracks = []; // { x, y, angle, len, life }

const bossNames = [
  '张总','李董','王经理','赵老板','钱主管','孙总监',
  '周扒皮','吴铁手','郑黑心','冯老抠','陈大地','褚员外',
  '卫总裁','蒋老大','沈财神','韩首富','杨巨头','朱大款'
];

function randomBossName() {
  return bossNames[Math.floor(Math.random() * bossNames.length)];
}

const tasks = [
  { name:'重写整个代码库', diff:9 },
  { name:'一天内交付年度项目', diff:10 },
  { name:'把ppt做成3D全息投影', diff:8 },
  { name:'用算盘训练AI大模型', diff:9 },
  { name:'不花钱让公司上市', diff:10 },
  { name:'手动数完一亿行Excel', diff:7 },
  { name:'徒手画500页原型图', diff:7 },
  { name:'用记事本写操作系统', diff:9 },
  { name:'让甲方主动加钱', diff:10 },
  { name:'说服程序员自愿加班', diff:8 },
  { name:'把屎山代码重构为艺术品', diff:8 },
  { name:'让竞品公司主动投降', diff:9 },
  { name:'用三句话让投资人打钱', diff:8 },
  { name:'一天招到100个架构师', diff:9 },
  { name:'用纸笔写出AI程序', diff:7 },
];

const scolds = [
  '你是干什么吃的！','这点事都做不好？','废物！','年终奖没了！',
  '996都便宜你了！','实习生都比你强！','明天别来了！','你被降级了！',
  '工资扣一半！','干不了就滚蛋！','你是我带过最差的一届！',
  'PPT都不会做？','代码都不会写？','连AI都不如！',
];

function createBoss() {
  const name = randomBossName();
  boss = {
    name, x: W/2, y: H*0.45,
    w: 80, h: 100,
    vx: 0, vy: 0,
    hp: 100, maxHp: 100,
    state: 'idle',
    stateTimer: 0,
    expression: 0,
    color: `hsl(${Math.random()*30+10}, 60%, 55%)`,
    tieColor: `hsl(${Math.random()*360}, 70%, 45%)`,
    scale: 1,
    bobY: 0,
  };
  task = null;
  bossDefeated = false;
  activeEffect = null;
  floorCracks = [];
  document.getElementById('boss-name').textContent = `👔 ${boss.name} #${bossNum}`;
}

// ==================== Particles ====================
function spawnParticles(x, y, count, color, spread=5, life=40) {
  for (let i=0; i<count; i++) {
    const a = Math.random()*Math.PI*2, s = Math.random()*spread;
    particles.push({
      x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-3,
      life: life*(0.5+Math.random()*0.5), maxLife: life,
      color, size: Math.random()*4+2
    });
  }
}

function spawnExplosion(x, y, count, colors, spread=8) {
  for (let i=0; i<count; i++) {
    const a = Math.random()*Math.PI*2, s = Math.random()*spread;
    particles.push({
      x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s - 5,
      life: 30+Math.random()*25, maxLife: 55,
      color: colors[Math.floor(Math.random()*colors.length)],
      size: Math.random()*6+3,
      gravity: true
    });
  }
}

function spawnFloat(x, y, text, color='#ff0', size=20) {
  floatingTexts.push({ x, y, vy:-4, text, color, life:70, maxLife:70, size });
}

function shake(amount) { shakeDur = Math.max(shakeDur, amount); }

// ==================== Floor Cracks ====================
function addCrack(x, y) {
  for (let i=0; i<8; i++) {
    floorCracks.push({
      x: x + (Math.random()-0.5)*120,
      y: y + Math.random()*15,
      angle: Math.random()*Math.PI,
      len: 30+Math.random()*80,
      life: 40+Math.random()*40,
      maxLife: 80
    });
  }
}

// ==================== Actions ====================
function showMsg(text, color='#ff0') {
  const el = document.getElementById('msg-pop');
  el.textContent = text; el.style.color = color;
  el.style.opacity = '1';
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => { el.style.opacity = '0'; }, 1500);
}

function assignTask() {
  initAudio();
  if (!boss || bossDefeated) return;
  if (task) { showMsg('上一个任务还没完成呢！','#f88'); return; }

  task = tasks[Math.floor(Math.random()*tasks.length)];
  boss.state = 'working';
  boss.stateTimer = 180 + task.diff * 30;
  boss.expression = 1;
  sfx(400, 'square', 0.15, 0.04);
  showMsg(`📋 ${task.name}！`, '#fd0');
  spawnFloat(boss.x, boss.y-60, `任务: ${task.name}`, '#fd0', 18);
}

function punishBoss(type) {
  initAudio();
  if (!boss || bossDefeated) return;
  if (!task) { showMsg('先安排任务再说！','#f88'); return; }
  if (boss.state === 'working') { showMsg('任务还没到时间！','#f88'); return; }

  let furyGain = 0;

  switch(type) {
    case 'whip':
      furyGain = 25;
      activeEffect = { type: 'hammer', timer: 55, phase: 0 };
      sfxRumble(0.5, 0.15);
      spawnFloat(boss.x, boss.y-70, '🔨 大锤审判！！', '#ff4444', 30);
      break;
    case 'kick':
      furyGain = 30;
      activeEffect = { type: 'leg', timer: 60, phase: 0 };
      sfxRumble(0.6, 0.18);
      spawnFloat(boss.x, boss.y-70, '🦵 金刚践踏！！', '#ff8800', 30);
      break;
    case 'scold':
      furyGain = 20;
      activeEffect = { type: 'roar', timer: 50, phase: 0 };
      const scold = scolds[Math.floor(Math.random()*scolds.length)];
      spawnFloat(boss.x, boss.y-70, scold, '#ff00ff', 26);
      sfx(80, 'sawtooth', 0.4, 0.12, 60);
      sfx(50, 'square', 0.5, 0.12, 40);
      break;
  }

  fury += furyGain;
  boss.hp -= furyGain * 1.2;
  document.getElementById('fury').textContent = `😡 怒气: ${fury}`;

  if (boss.hp <= 0) {
    bossDefeated = true;
    boss.hp = 0;
    spawnFloat(boss.x, boss.y-30, '我错了！！', '#fff', 28);
  }
}

function fireBoss() {
  initAudio();
  if (!boss) return;
  gold++;
  fury += 30;
  screenFlash = 20;
  spawnExplosion(boss.x, boss.y, 50, ['#ff0','#f80','#f44','#fff'], 15);
  spawnFloat(boss.x, boss.y-60, '🔥 你被炒了！', '#ff4400', 32);
  sfxRumble(0.8, 0.2);
  sfx(30, 'sawtooth', 0.6, 0.2, -25);
  shake(30);
  bossDefeated = true;
  document.getElementById('gold').textContent = `💼 炒鱿鱼: ${gold}`;
  document.getElementById('fury').textContent = `😡 怒气: ${fury}`;

  setTimeout(() => {
    bossNum++;
    createBoss();
    showMsg(`👔 新老板来了: ${boss.name}！`, '#0f0');
  }, 1800);
}

// ==================== Task Check ====================
function checkTask() {
  if (!boss || !task || bossDefeated) return;
  if (boss.state !== 'working') return;
  boss.stateTimer--;

  if (boss.stateTimer <= 0) {
    boss.state = 'idle';
    boss.expression = 2;
    spawnFloat(boss.x, boss.y-40, '❌ 没完成!', '#f44', 24);
    sfx(200, 'sawtooth', 0.3, 0.08, -100);
    const el = document.getElementById('msg-pop');
    el.style.opacity = '1';
    el.textContent = '任务失败！狠狠惩罚他！';
    el.style.color = '#f66';
    setTimeout(() => { el.style.opacity = '0'; }, 1500);
  }
}

// ==================== Update ====================
function update() {
  if (screenFlash > 0) screenFlash--;

  if (shakeDur > 0) {
    shakeX = (Math.random()-0.5)*shakeDur*2.5;
    shakeY = (Math.random()-0.5)*shakeDur*2.5;
    shakeDur--;
  } else { shakeX=0; shakeY=0; }

  // Active effect
  if (activeEffect) {
    activeEffect.timer--;
    if (activeEffect.type === 'hammer' && activeEffect.timer < 40 && activeEffect.phase === 0) {
      activeEffect.phase = 1;
      // Impact!
      shake(25);
      screenFlash = 8;
      spawnExplosion(boss.x, boss.y, 40, ['#fff','#f44','#f80','#ff0'], 12);
      addCrack(boss.x, H*0.72);
      boss.vx = (Math.random()-0.5)*25;
      boss.vy = -15;
      boss.expression = 2;
      boss.state = 'panic';
      boss.stateTimer = 50;
      sfx(25, 'square', 0.5, 0.15, -20);
      sfxRumble(0.3, 0.2);
    }
    if (activeEffect.type === 'leg' && activeEffect.timer < 42 && activeEffect.phase === 0) {
      activeEffect.phase = 1;
      shake(30);
      screenFlash = 10;
      spawnExplosion(boss.x, boss.y+30, 50, ['#fff','#8B4513','#f80','#654321'], 14);
      addCrack(boss.x, H*0.72);
      boss.vx = (Math.random()-0.5)*20;
      boss.vy = -18;
      boss.expression = 2;
      boss.state = 'panic';
      boss.stateTimer = 55;
      sfx(20, 'sawtooth', 0.6, 0.18, -15);
      sfxRumble(0.4, 0.25);
    }
    if (activeEffect.type === 'roar' && activeEffect.timer < 25 && activeEffect.phase === 0) {
      activeEffect.phase = 1;
      shake(18);
      screenFlash = 5;
      spawnExplosion(boss.x-30, boss.y-20, 25, ['#f0f','#fff','#a0f'], 8);
      boss.vx = (Math.random() < 0.5 ? -1 : 1) * 30;
      boss.vy = -6;
      boss.expression = 2;
      boss.state = 'panic';
      boss.stateTimer = 45;
    }
    if (activeEffect.timer <= 0) {
      activeEffect = null;
    }
  }

  if (boss && !bossDefeated) {
    boss.x += boss.vx; boss.y += boss.vy;
    boss.vx *= 0.85; boss.vy *= 0.85;
    boss.x = Math.max(60, Math.min(W-60, boss.x));
    boss.y = Math.max(100, Math.min(H-200, boss.y));
    if (Math.abs(boss.vy) < 0.3 && boss.y < H-200) boss.vy += 1.5;
    if (boss.y > H-200) { boss.y = H-200; boss.vy *= -0.3; }

    boss.bobY = Math.sin(Date.now()*0.005)*(boss.state==='panic'?6:2);

    if (boss.stateTimer > 0) boss.stateTimer--;
    if (boss.state === 'panic' && boss.stateTimer <= 0) {
      boss.state = 'idle'; boss.expression = 0;
    }

    checkTask();
  }

  // Particles
  particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; if (p.gravity) p.vy+=0.15; p.life--; });
  particles = particles.filter(p=>p.life>0);

  // Floating text
  floatingTexts.forEach(t => { t.y+=t.vy; t.life--; });
  floatingTexts = floatingTexts.filter(t=>t.life>0);

  // Floor cracks
  floorCracks.forEach(c => { c.life--; });
  floorCracks = floorCracks.filter(c=>c.life>0);
}

// ==================== Draw ====================
function drawOffice() {
  // Floor
  const floorY = H*0.72;
  ctx.fillStyle = '#2d2416';
  ctx.fillRect(0, floorY, W, H*0.28);
  ctx.strokeStyle = '#3d3426';
  ctx.lineWidth = 1;
  for (let x=0; x<W; x+=80) {
    ctx.beginPath(); ctx.moveTo(x, floorY); ctx.lineTo(x+40, H); ctx.stroke();
  }

  // Cracks on floor
  floorCracks.forEach(c => {
    const a = c.life/c.maxLife;
    ctx.strokeStyle = `rgba(0,0,0,${a*0.7})`;
    ctx.lineWidth = 2*a;
    ctx.beginPath();
    ctx.moveTo(c.x, c.y);
    ctx.lineTo(c.x + Math.cos(c.angle)*c.len*a, c.y + Math.sin(c.angle)*c.len*a*0.5);
    ctx.stroke();
  });

  // Desk
  const dx = W/2, dy = H*0.68;
  ctx.fillStyle = '#5c3d2e';
  ctx.fillRect(dx-120, dy-15, 240, 30);
  ctx.fillStyle = '#7a5540';
  ctx.fillRect(dx-110, dy-20, 220, 8);
  // Computer
  ctx.fillStyle = '#222';
  ctx.fillRect(dx-30, dy-60, 60, 42);
  ctx.fillStyle = '#1a3a5c';
  ctx.fillRect(dx-27, dy-57, 54, 34);
  // Screen content
  if (task && boss && !bossDefeated) {
    ctx.fillStyle = boss.state==='working' ? '#0f0' : '#f00';
    ctx.font = '8px monospace'; ctx.textAlign = 'center';
    ctx.fillText(boss.state==='working'?'LOADING...':'TASK FAILED', dx, dy-32);
  }
}

// ==================== GIANT EFFECTS ====================

function drawHammerEffect() {
  if (!activeEffect || activeEffect.type !== 'hammer') return;
  const t = activeEffect.timer;
  const maxT = 55;
  const progress = 1 - t/maxT; // 0→1

  ctx.save();

  let hx, hy, rotation, scale, alpha = 1;

  if (activeEffect.phase === 0) {
    // Windup phase: hammer rises and grows above boss
    const easeIn = progress * progress;
    hx = boss.x - 40;
    hy = boss.y - 200 - easeIn * 150;
    rotation = -1.2 + easeIn * 1.8; // Rotate back then forward
    scale = 0.5 + easeIn * 3.0;
    if (progress > 0.6) alpha = 1 - (progress-0.6)/0.4 * 0.3; // slight fade before impact
  } else {
    // Impact/aftermath: hammer slams down
    const postProgress = 1 - t/40;
    hx = boss.x - 20;
    hy = boss.y + 20 - postProgress * 30;
    rotation = 0.3 + postProgress * 0.2;
    scale = 3.0 - postProgress * 1.5;
    alpha = 1 - postProgress * 0.7;
  }

  if (alpha <= 0) { ctx.restore(); return; }
  ctx.globalAlpha = alpha;
  ctx.translate(hx + 60*scale, hy + 40*scale);
  ctx.rotate(rotation);
  ctx.scale(scale, scale);

  // Hammer handle (thick)
  const handleGrad = ctx.createLinearGradient(0, 0, 20, 0);
  handleGrad.addColorStop(0, '#5c3a1e');
  handleGrad.addColorStop(0.5, '#8B6914');
  handleGrad.addColorStop(1, '#3d2010');
  ctx.fillStyle = handleGrad;
  ctx.fillRect(-6, 10, 12, 70);

  // Handle grip wraps
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2;
  for (let i=0; i<5; i++) {
    ctx.beginPath();
    ctx.moveTo(-6, 55+i*5);
    ctx.lineTo(6, 55+i*5);
    ctx.stroke();
  }

  // Hammer head - MASSIVE spiked block
  const headGrad = ctx.createLinearGradient(0, -35, 0, 10);
  headGrad.addColorStop(0, '#888');
  headGrad.addColorStop(0.4, '#ddd');
  headGrad.addColorStop(0.6, '#666');
  headGrad.addColorStop(1, '#333');
  ctx.fillStyle = headGrad;
  // Main block
  ctx.beginPath();
  ctx.moveTo(-28, -5);
  ctx.lineTo(-30, -30);
  ctx.lineTo(-15, -38);
  ctx.lineTo(15, -38);
  ctx.lineTo(30, -30);
  ctx.lineTo(28, -5);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Spikes on top
  ctx.fillStyle = '#aaa';
  [-20, -8, 8, 20].forEach(sx => {
    ctx.beginPath();
    ctx.moveTo(sx-4, -35);
    ctx.lineTo(sx, -50);
    ctx.lineTo(sx+4, -35);
    ctx.fill();
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Glow effect on impact
  if (activeEffect.phase === 1 && t > 30) {
    ctx.fillStyle = `rgba(255,200,50,${(t-30)/10*0.6})`;
    ctx.beginPath(); ctx.arc(0, -5, 40, 0, Math.PI*2); ctx.fill();
  }

  ctx.restore();

  // Impact shockwave ring
  if (activeEffect.phase === 1 && t > 25) {
    const ringProgress = 1 - t/40;
    const ringR = ringProgress * 180;
    ctx.strokeStyle = `rgba(255,200,100,${(1-ringProgress)*0.8})`;
    ctx.lineWidth = 8*(1-ringProgress);
    ctx.beginPath(); ctx.arc(boss.x, boss.y, ringR, 0, Math.PI*2); ctx.stroke();
  }
}

function drawLegEffect() {
  if (!activeEffect || activeEffect.type !== 'leg') return;
  const t = activeEffect.timer;
  const maxT = 60;
  const progress = 1 - t/maxT;

  ctx.save();

  let lx, ly, scale, alpha = 1;

  if (activeEffect.phase === 0) {
    // Leg descends from above
    lx = boss.x;
    ly = boss.y - 300 + progress * 280; // comes down from sky
    scale = 2.0 + progress * 1.5;
    // Shadow grows as leg gets closer
    ctx.fillStyle = `rgba(0,0,0,${progress*0.6})`;
    ctx.beginPath();
    ctx.ellipse(boss.x, H*0.72, 50*progress, 12*progress, 0, 0, Math.PI*2);
    ctx.fill();
  } else {
    // Leg on ground, slight rebound
    const postProgress = 1 - t/42;
    lx = boss.x;
    ly = boss.y + 20 - postProgress * 25;
    scale = 3.5 - postProgress * 2;
    alpha = 1 - postProgress * 0.6;
  }

  if (alpha <= 0) { ctx.restore(); return; }
  ctx.globalAlpha = alpha;
  ctx.translate(lx, ly);
  ctx.scale(scale, scale);

  // Giant gorilla leg
  // Thigh
  const thighGrad = ctx.createLinearGradient(0, 0, 0, 40);
  thighGrad.addColorStop(0, '#3d2b1f');
  thighGrad.addColorStop(0.5, '#5c3d2e');
  thighGrad.addColorStop(1, '#2a1a10');
  ctx.fillStyle = thighGrad;
  ctx.beginPath();
  ctx.moveTo(-15, -10);
  ctx.lineTo(-20, 35);
  ctx.lineTo(-8, 40);
  ctx.lineTo(8, 40);
  ctx.lineTo(20, 35);
  ctx.lineTo(15, -10);
  ctx.fill();

  // Fur texture lines
  ctx.strokeStyle = '#2a1a10';
  ctx.lineWidth = 1;
  for (let i=0; i<6; i++) {
    ctx.beginPath();
    ctx.moveTo(-12+i*2, 5+i*5);
    ctx.quadraticCurveTo(0, 8+i*5, 12-i*2, 5+i*5);
    ctx.stroke();
  }

  // Calf/ankle
  ctx.fillStyle = '#2a1a10';
  ctx.fillRect(-10, 38, 20, 18);

  // Giant FOOT
  const footGrad = ctx.createLinearGradient(0, 50, 0, 65);
  footGrad.addColorStop(0, '#3d2b1f');
  footGrad.addColorStop(1, '#1a0a00');
  ctx.fillStyle = footGrad;
  ctx.beginPath();
  ctx.moveTo(-8, 52);
  ctx.lineTo(-25, 55);
  ctx.lineTo(-30, 60);
  ctx.lineTo(-20, 70);
  ctx.lineTo(25, 70);
  ctx.lineTo(32, 60);
  ctx.lineTo(28, 55);
  ctx.lineTo(8, 52);
  ctx.fill();

  // Toe nails
  ctx.fillStyle = '#ddd';
  [15, 22, 28].forEach(tx => {
    ctx.beginPath(); ctx.arc(tx, 68, 3, 0, Math.PI); ctx.fill();
  });

  // Toes
  ctx.fillStyle = '#1a0a00';
  ctx.lineWidth = 1;
  ctx.strokeStyle = '#111';
  [15, 22, 28].forEach(tx => {
    ctx.beginPath(); ctx.arc(tx, 62, 5, Math.PI, 0); ctx.fill(); ctx.stroke();
  });

  ctx.restore();

  // Impact shockwave
  if (activeEffect.phase === 1 && t > 28) {
    const ringProgress = 1 - t/42;
    const ringR = ringProgress * 200;
    ctx.strokeStyle = `rgba(139,90,43,${(1-ringProgress)*0.7})`;
    ctx.lineWidth = 10*(1-ringProgress);
    ctx.beginPath(); ctx.arc(boss.x, H*0.72, ringR, 0, Math.PI*2); ctx.stroke();

    // Dust cloud
    const dustA = (1-ringProgress)*0.5;
    ctx.fillStyle = `rgba(180,150,120,${dustA})`;
    for (let i=0; i<8; i++) {
      const dx2 = (Math.random()-0.5)*ringR*2;
      const dy2 = (Math.random()-0.5)*ringR*0.8 - ringR*0.3;
      ctx.beginPath();
      ctx.arc(boss.x+dx2, H*0.72+dy2, 15+Math.random()*25, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function drawRoarEffect() {
  if (!activeEffect || activeEffect.type !== 'roar') return;
  const t = activeEffect.timer;
  const maxT = 50;
  const progress = 1 - t/maxT;

  ctx.save();

  // Lion face manifestation
  const lx = boss.x - 60;
  const ly = boss.y - 80;
  const alpha = activeEffect.phase === 0 ? Math.min(1, progress*2) : Math.max(0, 1 - (1-t/45)*1.5);

  if (alpha > 0) {
    ctx.globalAlpha = alpha * 0.85;
    ctx.translate(lx, ly);
    const faceScale = 1.5 + progress * 0.5;
    ctx.scale(faceScale, faceScale);

    // Lion mane - massive fiery/spirit mane
    const maneGrad = ctx.createRadialGradient(0, 0, 15, 0, 0, 55);
    maneGrad.addColorStop(0, '#ff4400');
    maneGrad.addColorStop(0.4, '#ff8800');
    maneGrad.addColorStop(0.7, '#ffcc00');
    maneGrad.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = maneGrad;
    ctx.beginPath(); ctx.arc(0, 0, 55, 0, Math.PI*2); ctx.fill();

    // Spiky mane tufts
    for (let i=0; i<20; i++) {
      const angle = (i/20)*Math.PI*2 + Math.sin(Date.now()*0.02+i)*0.3;
      const innerR = 25, outerR = 45+Math.sin(Date.now()*0.03+i*2)*8;
      ctx.fillStyle = i%2===0 ? '#ff6600' : '#ffaa00';
      ctx.beginPath();
      ctx.moveTo(Math.cos(angle)*innerR, Math.sin(angle)*innerR);
      ctx.lineTo(Math.cos(angle-0.12)*outerR, Math.sin(angle-0.12)*outerR);
      ctx.lineTo(Math.cos(angle+0.12)*outerR, Math.sin(angle+0.12)*outerR);
      ctx.fill();
    }

    // Lion face
    const faceGrad = ctx.createRadialGradient(0, 0, 5, 0, 0, 25);
    faceGrad.addColorStop(0, '#ffdd88');
    faceGrad.addColorStop(1, '#cc8844');
    ctx.fillStyle = faceGrad;
    ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI*2); ctx.fill();

    // Angry eyes
    ctx.fillStyle = '#ff0';
    ctx.beginPath(); ctx.arc(-9, -6, 7, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(9, -6, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-9, -5, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(9, -5, 3.5, 0, Math.PI*2); ctx.fill();
    // Angry eyebrows
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(-16, -15); ctx.lineTo(-4, -12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(16, -15); ctx.lineTo(4, -12); ctx.stroke();

    // Open roaring mouth
    ctx.fillStyle = '#200';
    ctx.beginPath(); ctx.ellipse(0, 10, 12, 9, 0, 0, Math.PI*2); ctx.fill();
    // Teeth
    ctx.fillStyle = '#fff';
    [-8, -4, 0, 4, 8].forEach(tx => {
      ctx.beginPath();
      ctx.moveTo(tx-2, 2);
      ctx.lineTo(tx, 14);
      ctx.lineTo(tx+2, 2);
      ctx.fill();
    });

    // Nose
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(0, 2, 5, 0, Math.PI); ctx.fill();
  }

  ctx.restore();

  // Sound wave rings emanating from roar
  const ringCount = 5;
  for (let i=0; i<ringCount; i++) {
    const ringDelay = i * 0.12;
    const ringProgress = ((progress + ringDelay) % 1.2);
    if (ringProgress < 0 || ringProgress > 1) continue;
    const ringR = ringProgress * 250;
    const ringAlpha = (1-ringProgress) * 0.7;
    ctx.strokeStyle = `rgba(255,100,255,${ringAlpha})`;
    ctx.lineWidth = 4*(1-ringProgress);
    ctx.beginPath();
    ctx.arc(boss.x, boss.y-20, ringR, 0, Math.PI*2);
    ctx.stroke();

    // Second set - orange
    const ringProgress2 = ((progress + ringDelay + 0.06) % 1.2);
    if (ringProgress2 > 0 && ringProgress2 < 1) {
      const ringR2 = ringProgress2 * 230;
      ctx.strokeStyle = `rgba(255,150,50,${(1-ringProgress2)*0.6})`;
      ctx.lineWidth = 3*(1-ringProgress2);
      ctx.beginPath();
      ctx.arc(boss.x, boss.y-20, ringR2, 0, Math.PI*2);
      ctx.stroke();
    }
  }
}

// ==================== Draw Boss ====================
function drawBoss() {
  if (!boss || bossDefeated) return;
  const b = boss;
  ctx.save();
  ctx.translate(b.x, b.y + b.bobY);
  ctx.scale(b.scale, b.scale);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, 52, 30, 6, 0, 0, Math.PI*2); ctx.fill();

  // Body (suit)
  ctx.fillStyle = '#333';
  ctx.fillRect(-22, 4, 44, 44);
  // Shirt
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.moveTo(-6,4); ctx.lineTo(6,4); ctx.lineTo(10,28); ctx.lineTo(-10,28); ctx.fill();
  // Tie
  ctx.fillStyle = b.tieColor;
  ctx.beginPath(); ctx.moveTo(0,8); ctx.lineTo(-6,18); ctx.lineTo(-2,32); ctx.lineTo(0,34); ctx.lineTo(2,32); ctx.lineTo(6,18); ctx.fill();

  // Arms
  ctx.fillStyle = '#333';
  ctx.save(); ctx.translate(-22, 12);
  ctx.rotate(Math.sin(Date.now()*0.01)*0.15);
  ctx.fillRect(-4,-2, 8, 28);
  ctx.fillStyle = '#f5c6a0'; ctx.beginPath(); ctx.arc(0,28,7,0,Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.save(); ctx.translate(22, 12);
  ctx.rotate(-Math.sin(Date.now()*0.01)*0.15);
  ctx.fillRect(-4,-2, 8, 28);
  ctx.fillStyle = '#f5c6a0'; ctx.beginPath(); ctx.arc(0,28,7,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Legs
  ctx.fillStyle = '#444';
  ctx.fillRect(-16, 46, 12, 18);
  ctx.fillRect(4, 46, 12, 18);
  // Shoes
  ctx.fillStyle = '#111';
  ctx.fillRect(-18, 60, 16, 6);
  ctx.fillRect(2, 60, 16, 6);

  // Head
  ctx.fillStyle = b.color;
  ctx.beginPath(); ctx.arc(0, -8, 20, 0, Math.PI*2); ctx.fill();
  // Hair
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(0, -16, 18, Math.PI, 0); ctx.fill();
  // Bald spot
  ctx.fillStyle = b.color;
  ctx.beginPath(); ctx.arc(0, -12, 8, 0, Math.PI*2); ctx.fill();

  // Eyes
  const eyeY = -10;
  if (b.expression === 2) {
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
    [-6, 6].forEach(ex => {
      ctx.beginPath(); ctx.moveTo(ex-3,eyeY-3); ctx.lineTo(ex+3,eyeY+3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ex+3,eyeY-3); ctx.lineTo(ex-3,eyeY+3); ctx.stroke();
    });
  } else if (b.expression === 3) {
    ctx.fillStyle = '#f00';
    [-6, 6].forEach(ex => {
      ctx.beginPath(); ctx.arc(ex, eyeY, 3, 0, Math.PI*2); ctx.fill();
    });
  } else {
    ctx.fillStyle = '#fff';
    [-6, 6].forEach(ex => {
      ctx.beginPath(); ctx.arc(ex, eyeY, 6, 0, Math.PI*2); ctx.fill();
    });
    ctx.fillStyle = '#000';
    [-6, 6].forEach(ex => {
      ctx.beginPath(); ctx.arc(ex-1, eyeY, 2.5, 0, Math.PI*2); ctx.fill();
    });
  }

  // Mouth
  if (b.expression === 2) {
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(0, 4, 5, 0, Math.PI); ctx.fill();
  } else if (b.expression === 3) {
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(0, 6, 6, Math.PI, 0); ctx.fill();
  } else {
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 2, 4, 0.2, Math.PI-0.2); ctx.stroke();
  }

  // Sweat drops
  if (b.expression === 1) {
    ctx.fillStyle = '#4af';
    ctx.beginPath(); ctx.arc(18, -14, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(18, -8, 2, 0, Math.PI*2); ctx.fill();
  }

  // HP bar
  if (task) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(-25, -42, 50, 6);
    const hpPct = b.hp / b.maxHp;
    const hpColor = hpPct > 0.5 ? '#0f0' : hpPct > 0.25 ? '#ff0' : '#f00';
    ctx.fillStyle = hpColor;
    ctx.fillRect(-25, -42, 50*hpPct, 6);
  }

  ctx.restore();
}

function drawParticlesAndText() {
  particles.forEach(p => {
    const a = p.life/p.maxLife;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = a;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size*a, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  floatingTexts.forEach(t => {
    const a = t.life/t.maxLife;
    ctx.fillStyle = t.color;
    ctx.globalAlpha = a;
    ctx.font = `bold ${t.size}px "PingFang SC","Microsoft YaHei",sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(t.text, t.x, t.y);
  });
  ctx.globalAlpha = 1;
}

function drawTaskPanel() {
  if (!task || !boss || bossDefeated) return;
  const px = W/2, py = 80;

  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  const pw = 280, ph = 60;
  ctx.beginPath(); ctx.roundRect(px-pw/2, py, pw, ph, 12); ctx.fill(); ctx.stroke();

  ctx.fillStyle = '#fd0';
  ctx.font = 'bold 13px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`📋 ${task.name}`, px, py+18);

  ctx.fillStyle = '#aaa';
  ctx.font = '11px "PingFang SC","Microsoft YaHei",sans-serif';
  const diffStars = '⭐'.repeat(task.diff);
  ctx.fillText(`难度: ${diffStars}`, px, py+38);

  if (boss.state === 'working') {
    const remaining = Math.ceil(boss.stateTimer/60);
    ctx.fillStyle = '#0f0';
    ctx.fillText(`⏳ 还剩 ${remaining}秒`, px, py+52);
  } else if (boss.state === 'idle' || boss.state === 'panic') {
    ctx.fillStyle = '#f44';
    ctx.fillText('❌ 已超时 - 快惩罚他！', px, py+52);
  }
}

// ==================== Render ====================
function draw() {
  // BG gradient
  const grd = ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0, '#1a1a2e');
  grd.addColorStop(0.7, '#2d2d44');
  grd.addColorStop(1, '#3d3d5c');
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,W,H);

  // Screen flash
  if (screenFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${screenFlash/25})`;
    ctx.fillRect(0,0,W,H);
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawOffice();

  // Draw effects BEFORE boss (behind) or AFTER (on top)
  // Hammer and leg above boss
  drawBoss();
  // Giant effects on top
  if (activeEffect) {
    if (activeEffect.type === 'hammer') drawHammerEffect();
    else if (activeEffect.type === 'leg') drawLegEffect();
    else if (activeEffect.type === 'roar') drawRoarEffect();
  }
  drawTaskPanel();
  drawParticlesAndText();

  ctx.restore();

  // Fire button pulse
  if (task && boss && !bossDefeated && boss.state !== 'working') {
    const fb = document.querySelector('.btn-fire');
    if (fb) fb.style.animation = 'pulse 0.5s ease-in-out infinite';
  } else {
    const fb = document.querySelector('.btn-fire');
    if (fb) fb.style.animation = '';
  }
}

// ==================== Loop ====================
function loop() { update(); draw(); requestAnimationFrame(loop); }

createBoss();
loop();

canvas.addEventListener('click', initAudio);
canvas.addEventListener('touchstart', initAudio);
</script>

<style>
@keyframes pulse {
  0%,100% { box-shadow: 0 0 5px #f44; transform: scale(1); }
  50% { box-shadow: 0 0 35px #f44, 0 0 60px #f80; transform: scale(1.08); }
}
</style>
